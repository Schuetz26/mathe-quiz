<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stammfunktionen Quiz Deluxe</title>
<script src="https://cdn.jsdelivr.net/npm/mathjs@14/lib/browser/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
body{margin:0;padding:20px;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#4f46e5,#06b6d4)}
.card{max-width:1100px;margin:auto;background:white;border-radius:24px;padding:24px;box-shadow:0 12px 35px rgba(0,0,0,.25)}
button{background:#4f46e5;color:white;border:none;border-radius:12px;padding:12px 18px;cursor:pointer}
button:hover{transform:translateY(-1px)}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc}
.task{text-align:center;font-size:1.5rem;margin:20px}
.center{text-align:center}
.progress{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.seg{width:14px;height:14px;border-radius:4px;background:#ddd}
.ok{background:#22c55e}.bad{background:#ef4444}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px}
.good{color:#15803d}.badtxt{color:#b91c1c}
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const app=document.getElementById("app");
let level=1,punkte=0,nr=0,maxA=15,name="",history=[],review=[];

function hs(){return JSON.parse(localStorage.getItem("sfDeluxeHS2")||"[]")}
function saveHS(){
 let h=hs();
 h.push({name,punkte,level,date:new Date().toLocaleDateString("de-DE")});
 h.sort((a,b)=>b.punkte-a.punkte);
 localStorage.setItem("sfDeluxeHS2",JSON.stringify(h.slice(0,10)));
}
function hsHtml(){
 let h=hs();
 let s="<table><tr><th>#</th><th>Name</th><th>Punkte</th><th>Level</th></tr>";
 h.forEach((e,i)=>s+=`<tr><td>${i+1}</td><td>${e.name}</td><td>${e.punkte}</td><td>${e.level}</td></tr>`);
 return s+"</table>";
}

function menu(){
 app.innerHTML=`<h1>Ōł½ Stammfunktionen Quiz Deluxe</h1>
 <div class='center'>
 Name: <input id='n'><br><br>
 <button onclick='start(1)'>ŌŁÉ Level 1</button>
 <button onclick='start(2)'>ŌŁÉŌŁÉ Level 2</button>
 <button onclick='start(3)'>ŌŁÉŌŁÉŌŁÉ Level 3</button><br><br>
 Aufgaben:
 <select id='a'><option>15</option><option>25</option><option>50</option></select>
 </div>
 <h2>­¤Åå Highscore</h2>${hsHtml()}`;
}

const L1=[
["2*x","x^2"],["3*x^2","x^3"],["4*x^3","x^4"],["5","5*x"],["7","7*x"],
["6*x^5","x^6"],["8*x^7","x^8"],["x^4","(1/5)*x^5"],["9*x","(9/2)*x^2"],
["5*x^2+2*x","(5/3)*x^3+x^2"]
];

const L2=[
["x^(1/2)","(2/3)*x^(3/2)"],
["4*x^(1/2)","(8/3)*x^(3/2)"],
["5*x^(-2)","-5*x^(-1)"],
["2*x^3-6*x","(1/2)*x^4-3*x^2"],
["7*x^(2/3)","(21/5)*x^(5/3)"],
["3*x^2+4*x^(1/2)","x^3+(8/3)*x^(3/2)"],
["8*x^(-3)","-4*x^(-2)"],
["2*x^(3/2)+6","(4/5)*x^(5/2)+6*x"]
];

const L3=[
["exp(x)","exp(x)"],
["5*exp(x)","5*exp(x)"],
["sin(x)","-cos(x)"],
["cos(x)","sin(x)"],
["1/x","log(x)"],
["5/x","5*log(x)"],
["2*x*exp(x^2)","exp(x^2)"],
["3*x^2*exp(x^3)","exp(x^3)"],
["2*x/(x^2+1)","log(x^2+1)"],
["x*(x^2+1)^4","(1/10)*(x^2+1)^5"],
["sin(x)*cos(x)","(1/2)*sin(x)^2"]
];

const BONUS=[
["6*x","x^3"],
["12*x^2","x^4"],
["sin(x)","-sin(x)"],
["cos(x)","-cos(x)"],
["exp(x)","exp(x)"]
];

function rnd(a){return a[Math.floor(Math.random()*a.length)]}

function gen(){
 if(level===1){let t=rnd(L1);return {f:t[0],sol:t[1]};}
 if(level===2){let t=rnd(L2);return {f:t[0],sol:t[1]};}
 if(Math.random()<0.10){let t=rnd(BONUS);return {bonus:true,f:t[0],sol:t[1]};}
 let t=rnd(L3);return {f:t[0],sol:t[1]};
}

function prog(){
 return "<div class='progress'>"+Array.from({length:maxA},(_,i)=>{
 let c="seg";
 if(history[i]===true)c+=" ok";
 if(history[i]===false)c+=" bad";
 return "<div class='"+c+"'></div>";
 }).join("")+"</div>";
}

function start(l){
 level=l;
 name=document.getElementById("n").value||"Unbekannt";
 maxA=+document.getElementById("a").value;
 punkte=0; nr=0; history=[]; review=[];
 nextQ();
}

function renderMath(){ if(window.MathJax) MathJax.typesetPromise(); }

function nextQ(){
 if(nr>=maxA) return ende();
 window.task=gen();
 nr++;
 app.innerHTML=`<h2>${name} | Level ${level}</h2>
 <p>Punkte: <b>${punkte}</b> | Aufgabe ${nr}/${maxA}</p>
 ${prog()}
 <div class='task'>
 ${task.bonus?"ŌŁÉ Bonusaufgabe: Bestimme eine Funktion, deren zweite Ableitung f(x) ist.":"Bestimme eine Stammfunktion zu:"}
 <br><br>\\(f(x)=${task.f}\\)
 </div>
 <div class='center'>
 F(x)= <input id='ans' style='width:360px'>
 <br><br><button onclick='check()'>Antwort pr├╝fen</button>
 </div><div id='msg'></div>`;
 document.getElementById("ans").addEventListener("keydown",e=>{if(e.key==="Enter")check();});
 renderMath();
}

function normalize(s){
 return s.toLowerCase()
 .replace(/\s+/g,"")
 .replaceAll("ln(","log(")
 .replaceAll("|x|","x");
}

function isCorrect(inp,target,second){
 try{
   let expr=normalize(inp);
   let deriv= second
      ? math.derivative(math.derivative(expr,"x"),"x")
      : math.derivative(expr,"x");

   let diff=math.simplify(`(${deriv.toString()})-(${target})`).toString();
   return diff==="0";
 }catch(e){
   return false;
 }
}

function check(){
 const user=document.getElementById("ans").value;
 const ok=isCorrect(user,task.f,task.bonus);
 const pts=ok?(task.bonus?15:10):-5;
 punkte+=pts;
 history[nr-1]=ok;

 review.push({
   f:task.f,
   user:user,
   solution:task.sol,
   ok:ok
 });

 document.getElementById("msg").innerHTML=`
 <div class='center'>
 <h3 class='${ok?"good":"badtxt"}'>${ok?"Ō£ģ Richtig":"ŌØī Falsch"}</h3>
 <p>${pts>0?"+":""}${pts} Punkte</p>
 <p>Musterl├Čsung: \\(F(x)=${task.sol.replaceAll("log","ln")}\\)</p>
 <button onclick='nextQ()'>Weiter</button>
 </div>`;
 renderMath();
}

function ende(){
 saveHS();
 let rows=review.map((r,i)=>`
 <tr>
 <td>${i+1}</td>
 <td>${r.f}</td>
 <td>${r.user}</td>
 <td>${r.solution}</td>
 <td>${r.ok?"Ō£ģ":"ŌØī"}</td>
 </tr>`).join("");

 app.innerHTML=`
 <h1>Spiel beendet</h1>
 <h2>${punkte} Punkte</h2>
 <h3>Aufgabenhistorie</h3>
 <table>
 <tr><th>#</th><th>Aufgabe</th><th>Deine Antwort</th><th>Musterl├Čsung</th><th>Ergebnis</th></tr>
 ${rows}
 </table>
 <h3>­¤Åå Highscore</h3>
 ${hsHtml()}
 <div class='center'><br><button onclick='menu()'>Neues Spiel</button></div>`;
}
menu();
</script>
</body></html>
