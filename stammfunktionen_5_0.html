<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stammfunktionen Quiz Deluxe 5.0</title>
<script src="https://cdn.jsdelivr.net/npm/mathjs@14/lib/browser/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
body{font-family:Segoe UI,Arial,sans-serif;margin:0;padding:20px;background:linear-gradient(135deg,#4338ca,#06b6d4,#22c55e)}
.card{max-width:1100px;margin:auto;background:#fff;padding:28px;border-radius:24px;box-shadow:0 18px 45px rgba(0,0,0,.25)}
button{background:#4f46e5;color:#fff;border:none;border-radius:14px;padding:12px 22px;font-weight:700;cursor:pointer}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc}
.task{font-size:2rem;text-align:center;margin:20px}
.center{text-align:center}
.progress{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.seg{width:16px;height:16px;border-radius:4px;background:#ddd}.ok{background:#22c55e}.bad{background:#ef4444}
</style>
</head>
<body><div class="card" id="app"></div>
<script>
const app=document.getElementById('app');
let level=1,maxA=15,nr=0,punkte=0,h=[];

function norm(s){
return s.toLowerCase().replace(/\s+/g,'').replaceAll(',','.')
.replaceAll('ln(','log(').replaceAll('lnx','log(x)')
.replace(/(\d)(x)/g,'$1*$2')
.replace(/sinx/g,'sin(x)').replace(/cosx/g,'cos(x)')
.replace(/e\^x/g,'exp(x)').replaceAll('|x|','x');
}

function randint(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(a){return a[Math.floor(Math.random()*a.length)]}

function genTask(){
 if(level==1){
   let n=randint(1,8), a=randint(2,12);
   return {f:`${a}*x^${n}`, sol:`(${a}/(${n+1}))*x^${n+1}`};
 }
 if(level==2){
   let t=choice([
   ()=>{let a=randint(2,8); return {f:`${a}*x^(1/2)`,sol:`(${2*a}/3)*x^(3/2)`}},
   ()=>{let a=randint(2,8); return {f:`${a}*x^(-2)`,sol:`-${a}*x^(-1)`}},
   ()=>{return {f:`${randint(2,6)}*x^3+${randint(2,6)}*x`,sol:'demo'}}]);
   let r=t(); if(r.sol=='demo'){let m=r.f.match(/(\d+)\*x\^3\+(\d+)\*x/); let a=+m[1],b=+m[2]; r.sol=`(${a}/4)*x^4+(${b}/2)*x^2`; } return r;
 }
 if(level==3 && Math.random()<0.1){
   return {bonus:true,f:'2*x*exp(x^2)',sol:'exp(x^2)'};
 }
 return choice([
 {f:'sin(x)',sol:'-cos(x)'},
 {f:'cos(x)',sol:'sin(x)'},
 {f:'exp(x)',sol:'exp(x)'},
 {f:'1/x',sol:'log(x)'},
 {f:'2*x/(x^2+1)',sol:'log(x^2+1)'}
 ]);
}

function menu(){
app.innerHTML=`<h1>∫ Stammfunktionen Quiz Deluxe 5.0</h1>
<div class=center>Name <input id=n><br><br>
<button onclick="start(1)">⭐</button>
<button onclick="start(2)">⭐⭐</button>
<button onclick="start(3)">⭐⭐⭐</button><br><br>
<select id=a><option>15</option><option>25</option><option>50</option></select></div>`;
}

function start(l){level=l;maxA=+a.value;nr=0;punkte=0;h=[];nextQ();}

function prog(){return '<div class=progress>'+Array.from({length:maxA},(_,i)=>`<div class="seg ${h[i]===true?'ok':h[i]===false?'bad':''}"></div>`).join('')+'</div>'}

function nextQ(){
 if(nr>=maxA){app.innerHTML=`<h1>Fertig</h1><h2>${punkte} Punkte</h2><button onclick="menu()">Neustart</button>`;return;}
 window.task=genTask(); nr++;
 app.innerHTML=`<h2>Punkte ${punkte} | ${nr}/${maxA}</h2>${prog()}
 <div class=task>${task.bonus?'⭐ Bonus (Knobelaufgabe)':'Bestimme eine Stammfunktion zu'}<br><br>\\(f(x)=${task.f}\\)</div>
 <div class=center>F(x)= <input id=ans style="width:500px"><br>
 <small>0,5 = 1/2 · e^x = exp(x) · sinx = sin(x)</small><br><br>
 <button onclick="check()">Prüfen</button></div><div id=m></div>`;
 MathJax.typesetPromise();
}

function check(){
 let ok=false;
 try{
  let d=task.bonus?math.derivative(norm(ans.value),'x'):math.derivative(norm(ans.value),'x');
  let diff=math.simplify(`(${d})-(${task.f})`).toString();
  ok=(diff==='0');
 }catch(e){}
 h[nr-1]=ok;
 punkte+=ok?10:-5;
 m.innerHTML=`<h3>${ok?'✅ Richtig':'❌ Falsch'}</h3><p>Musterlösung: ${task.sol}</p><button onclick="nextQ()">Weiter</button>`;
}
menu();
</script></body></html>
