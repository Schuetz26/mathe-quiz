<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LGS Quiz Pro</title>
<style>
body{font-family:Arial,sans-serif;background:#eef4fb;margin:0;padding:20px}
.card{max-width:950px;margin:auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
button{padding:10px 16px;border:none;border-radius:8px;background:#1976d2;color:#fff;cursor:pointer}
input,select{padding:8px}
.bar{height:18px;background:#ddd;border-radius:10px;overflow:hidden}.fill{height:100%;background:#4caf50;width:0}
table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px;text-align:center}
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
let level=1,punkte=0,nr=0,maxAufgaben=15,task;
function hs(){return JSON.parse(localStorage.getItem("lgsHS")||"[]")}
function saveHS(n){
 let a=hs(); a.push({name:n,punkte,level,datum:new Date().toLocaleDateString("de-DE")});
 a.sort((x,y)=>y.punkte-x.punkte); a=a.slice(0,10);
 localStorage.setItem("lgsHS",JSON.stringify(a));
}
function hsHTML(){
 let a=hs(); if(!a.length) return "<p>Noch keine Einträge.</p>";
 let h="<table><tr><th>#</th><th>Name</th><th>Punkte</th><th>Level</th><th>Datum</th></tr>";
 a.forEach((e,i)=>h+=`<tr><td>${i+1}</td><td>${e.name}</td><td>${e.punkte}</td><td>${e.level}</td><td>${e.datum}</td></tr>`);
 return h+"</table>";
}
function menu(){
 document.getElementById("app").innerHTML=`<h1>🎯 LGS Quiz Pro</h1>
 <p>Level wählen:</p>
 <button onclick="start(1)">⭐ Leicht</button>
 <button onclick="start(2)">⭐⭐ Mittel</button>
 <button onclick="start(3)">⭐⭐⭐ Schwer</button>
 <h2>Lehrermodus</h2>
 Aufgaben: <select id=m><option>10</option><option selected>15</option><option>20</option></select>
 <button onclick="localStorage.removeItem('lgsHS');menu()">Highscore löschen</button>
 <h2>🏆 Highscore</h2>${hsHTML()}`;
}
function r(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function term(c,v,first=false){
 if(c===0)return "";
 let s="";
 if(first){ if(c===-1)s="-"; else if(c!==1)s=c; }
 else { s=(c>0?" + ":" - "); c=Math.abs(c); if(c!==1)s+=c; }
 return s+v;
}
function eq(a,b,rhs){ return `${term(a,'x',true)}${term(b,'y')} = ${rhs}`; }
function unique(mx,k){
 let x=r(-mx,mx), y=r(-mx,mx);
 let a,b,c,d,det;
 do{
  a=r(1,k); b=r(-k,k); c=r(1,k); d=r(-k,k); det=a*d-b*c;
 }while(det===0 || b===0 || d===0);
 return {typ:'e',x,y,text:eq(a,b,a*x+b*y)+"<br>"+eq(c,d,c*x+d*y)};
}
function hard(){
 let t=unique(12,20);
 let x=t.x,y=t.y;
 let a=r(2,9),b=r(2,9),c=r(2,9),d=r(2,9);
 return {typ:'e',x,y,text:
 `${a}x + ${b}y = ${c}x + ${a*x+b*y-c*x}<br>`+
 `${d}x - y = ${d*x-y}`};
}
function none(){
 let a=r(1,8),b=r(1,8),rhs=r(-20,20);
 return {typ:'n',text:eq(a,b,rhs)+"<br>"+eq(a*2,b*2,rhs*2+5)};
}
function inf(){
 let a=r(1,8),b=r(1,8),rhs=r(-20,20);
 return {typ:'i',text:eq(a,b,rhs)+"<br>"+eq(a*2,b*2,rhs*2)};
}
function gen(){
 if(level==1) return unique(5,4);
 if(level==2) return unique(10,12);
 let z=Math.random(); if(z<.2)return none(); if(z<.4)return inf(); return hard();
}
function start(l){
 level=l; punkte=0; nr=0; maxAufgaben=+document.getElementById("m").value; next();
}
function next(){
 if(nr>=maxAufgaben){end();return}
 nr++; task=gen();
 let p=(nr-1)/maxAufgaben*100;
 app.innerHTML=`<h2>Level ${level}</h2><p>Punkte: ${punkte} | Aufgabe ${nr}/${maxAufgaben}</p>
 <div class=bar><div class=fill style="width:${p}%"></div></div>
 <h3>${task.text}</h3>
 x=<input id=x> y=<input id=y><br><br>
 <button onclick="check()">Prüfen</button><div id=msg></div>`;
}
function check(){
 let x=document.getElementById("x").value.trim().toLowerCase();
 let y=document.getElementById("y").value.trim().toLowerCase();
 let ok=false;
 if(task.typ==='e') ok=(Number(x)===task.x && Number(y)===task.y);
 if(task.typ==='n') ok=((x+" "+y).includes("keine"));
 if(task.typ==='i') ok=((x+" "+y).includes("unendlich"));
 let m=document.getElementById("msg");
 if(ok){punkte+=10;m.innerHTML="✅ Richtig";}
 else{
  punkte-=5;
  let l=task.typ==='n'?"Keine Lösung":task.typ==='i'?"Unendlich viele Lösungen":`x=${task.x}, y=${task.y}`;
  m.innerHTML="❌ "+l;
 }
 setTimeout(next,1500);
}
function end(){
 app.innerHTML=`<h1>Fertig!</h1><h2>${punkte} Punkte</h2>
 Name: <input id=n><button onclick="finish()">Speichern</button>
 <h2>🏆 Highscore</h2>${hsHTML()}`;
}
function finish(){ saveHS(document.getElementById("n").value||"Unbekannt"); menu(); }
menu();
</script>
</body></html>
