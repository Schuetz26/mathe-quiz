<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LGS Quiz Deluxe</title>
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}
.card{max-width:950px;margin:auto;background:#fff;border-radius:22px;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
h1,h2,h3{text-align:center}
.center{text-align:center}
button{background:#4f46e5;color:#fff;border:none;border-radius:10px;padding:10px 18px;cursor:pointer}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc}
.progress{display:flex;gap:4px;justify-content:center;margin:15px 0}
.seg{width:24px;height:18px;border-radius:4px;background:#ddd}
.ok{background:#22c55e}.bad{background:#ef4444}
.task{font-size:1.8rem;line-height:1.8;text-align:center;margin:20px 0}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px;text-align:center}
.badge{font-size:3rem;text-align:center}
</style>
</head>
<body><div class="card" id="app"></div>
<script>
let level=1,punkte=0,nr=0,maxA=15,task,name="",history=[];

const app=document.getElementById("app");
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function hs(){return JSON.parse(localStorage.getItem("lgsDeluxeHS")||"[]")}
function saveHS(){
 let h=hs();
 h.push({name,punkte,level,datum:new Date().toLocaleDateString("de-DE")});
 h.sort((a,b)=>b.punkte-a.punkte);
 localStorage.setItem("lgsDeluxeHS",JSON.stringify(h.slice(0,10)));
}
function hsHtml(){
 let h=hs(); if(!h.length)return "<p>Noch keine Einträge.</p>";
 let s="<table><tr><th>#</th><th>Name</th><th>Punkte</th><th>Level</th><th>Datum</th></tr>";
 h.forEach((e,i)=>s+=`<tr><td>${i+1}</td><td>${e.name}</td><td>${e.punkte}</td><td>${e.level}</td><td>${e.datum}</td></tr>`);
 return s+"</table>";
}
function menu(){
 app.innerHTML=`<h1>🎯 LGS Quiz Deluxe</h1>
 <div class='center'>Name: <input id='n'><br><br>
 <button onclick='start(1)'>⭐ Level 1</button>
 <button onclick='start(2)'>⭐⭐ Level 2</button>
 <button onclick='start(3)'>⭐⭐⭐ Level 3</button><br><br>
 Aufgaben: <select id='a'><option>10</option><option selected>15</option><option>20</option></select>
 </div><h2>🏆 Highscore</h2>${hsHtml()}`;
}
function term(k,v,f){
 if(k===0)return "";
 if(f){ if(k===1)return v; if(k===-1)return "-"+v; return k+v; }
 return (k>0?" + ":" - ")+(Math.abs(k)==1?"":Math.abs(k))+v;
}
function eq(a,b,r){return term(a,"x",true)+term(b,"y",false)+" = "+r;}
function unique(mx,cf){
 let x=R(-mx,mx),y=R(-mx,mx),a,b,c,d;
 do{a=R(1,cf);b=R(-cf,cf);c=R(1,cf);d=R(-cf,cf)}while(a*d-b*c===0);
 return {t:"e",x,y,text:eq(a,b,a*x+b*y)+"<br>"+eq(c,d,c*x+d*y)};
}
function none(){let a=R(1,6),b=R(1,6),r=R(-20,20);return{t:"n",text:eq(a,b,r)+"<br>"+eq(a*2,b*2,r*2+5)}}
function inf(){let a=R(1,6),b=R(1,6),r=R(-20,20);return{t:"i",text:eq(a,b,r)+"<br>"+eq(a*2,b*2,r*2)}}
function hard(){
 let x=R(-12,12),y=R(-12,12),a=R(2,9),b=R(2,9),c=R(2,9),d=R(2,9);
 return {t:"e",x,y,text:`${a}x + ${b}y = ${c}x + ${a*x+b*y-c*x}<br>${d}x - y = ${d*x-y}`}
}
function gen(){
 let z=Math.random();
 if(level==1){if(z<.15)return none();if(z<.30)return inf();return unique(5,4);}
 if(level==2){if(z<.1)return none();if(z<.2)return inf();return unique(10,12);}
 if(z<.2)return none(); if(z<.4)return inf(); return hard();
}
function prog(){
 return "<div class='progress'>"+Array.from({length:maxA},(_,i)=>{
 let c="seg"; if(history[i]===true)c+=" ok"; if(history[i]===false)c+=" bad";
 return "<div class='"+c+"'></div>";
 }).join("")+"</div>";
}
function start(l){
 name=document.getElementById("n").value||"Unbekannt";
 maxA=+document.getElementById("a").value;
 level=l;punkte=0;nr=0;history=[];nextQ();
}
function nextQ(){
 if(nr>=maxA)return ende();
 task=gen(); nr++;
 app.innerHTML=`<h2>${name} | Level ${level}</h2><p>Punkte: <b>${punkte}</b> | Aufgabe ${nr}/${maxA}</p>${prog()}
 <div class='task'>${task.text}</div>
 <div class='center'>x=<input id='x'> y=<input id='y'><br><small>Für Sonderfälle: "keine" oder "unendlich".</small><br><br>
 <button onclick='check()'>Antwort prüfen</button></div><div id='msg'></div>`;
}
function check(){
 let x=(document.getElementById('x').value||"").toLowerCase();
 let y=(document.getElementById('y').value||"").toLowerCase();
 let ok=false,sol="";
 if(task.t=="e"){ok=Number(x)===task.x&&Number(y)===task.y; sol=`x=${task.x}, y=${task.y}`}
 if(task.t=="n"){ok=x.includes("keine")||y.includes("keine"); sol="Keine Lösung"}
 if(task.t=="i"){ok=x.includes("unendlich")||y.includes("unendlich"); sol="Unendlich viele Lösungen"}
 history[nr-1]=ok;
 if(ok)punkte+=10; else punkte-=5;
 document.getElementById('msg').innerHTML=`<div class='center'><h3>${ok?"✅ Richtig":"❌ Falsch"}</h3><p>Antwort: <b>${sol}</b></p><button onclick='nextQ()'>➡️ Weiter</button></div>`;
}
function ende(){
 let medal="🥉"; if(punkte>=90)medal="🥈"; if(punkte>=130)medal="🥇";
 saveHS();
 app.innerHTML=`<div class='badge'>${medal}</div><h1>Spiel beendet</h1><h2>${punkte} Punkte</h2>${prog()}<h2>🏆 Highscore</h2>${hsHtml()}<div class='center'><button onclick='menu()'>Neues Spiel</button></div>`;
}
menu();
</script></body></html>
