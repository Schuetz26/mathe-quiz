<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Quiz</title>
<style>
  :root {
    --bg-deep: #161830;
    --bg-card: #232853;
    --bg-card-2: #2b3164;
    --border: #3b4280;
    --text: #eef0fb;
    --text-dim: #a9aed9;
    --blue: #4f7cff;
    --green: #2ecc71;
    --yellow: #f4a623;
    --red: #e84c4c;
    --good: #2ecc71;
    --bad: #e84c4c;
    --gold: #ffd166;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1d2150 0%, var(--bg-deep) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .app {
    width: 100%;
    max-width: 640px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 26px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  }

  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    text-align: center;
    letter-spacing: 0.2px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-bottom: 22px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .choice-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card-2);
    color: var(--text);
    font-size: 0.95rem;
  }
  .name-input::placeholder { color: var(--text-dim); }
  .name-input:focus { outline: none; border-color: var(--blue); }

  .pill-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .pill {
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s ease;
    text-align: center;
  }
  .pill:hover { border-color: var(--blue); }
  .pill.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
  }

  .level-card {
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    transition: 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .level-card:hover { border-color: var(--blue); transform: translateY(-1px); }
  .level-card:active { transform: translateY(0); }
  .level-card .stars { color: var(--gold); }

  .start-btn {
    width: 100%;
    padding: 15px;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #4f7cff, #6f5cff);
    color: white;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .start-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,124,255,0.35); }
  .start-btn:active { transform: translateY(0); }

  /* ---- History / Highscore ---- */
  .history-box {
    margin-top: 18px;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    max-height: 220px;
    overflow-y: auto;
  }
  .history-title {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .history-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.88rem;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(255,255,255,0.06);
    gap: 8px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-rank { color: var(--text-dim); width: 18px; flex: 0 0 auto; }
  .history-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-meta { color: var(--text-dim); font-size: 0.78rem; flex: 0 0 auto; }
  .history-score { color: var(--gold); font-weight: 700; flex: 0 0 auto; }
  .history-empty { color: var(--text-dim); font-size: 0.88rem; text-align: center; padding: 6px 0; }

  /* ---- Quiz Header ---- */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 0.9rem;
    color: var(--text-dim);
  }
  .quiz-top .score { color: var(--gold); font-weight: 700; font-size: 1.05rem; }

  .progress {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .seg {
    flex: 1;
    min-width: 6px;
    height: 8px;
    border-radius: 4px;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
  }
  .seg.ok { background: var(--good); border-color: var(--good); }
  .seg.bad { background: var(--bad); border-color: var(--bad); }

  /* ---- Aufgabenanzeige ---- */
  .task-box {
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 18px;
    min-height: 70px;
  }
  .task-eq {
    font-size: 1.3rem;
    color: var(--text);
    line-height: 1.8;
  }

  .answer-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
  }
  .answer-input {
    flex: 1;
    width: 100%;
    padding: 14px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card-2);
    color: var(--text);
    font-size: 1.05rem;
    text-align: center;
  }
  .answer-input::placeholder { color: var(--text-dim); }
  .answer-input:focus { outline: none; border-color: var(--blue); }
  .answer-input:disabled { opacity: 0.6; }

  .answer-labels {
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
  }
  .answer-labels span {
    flex: 1;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .hint {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin: 8px 2px 14px;
    text-align: center;
  }

  .check-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f7cff, #6f5cff);
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .check-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,124,255,0.35); }
  .check-btn:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

  /* ---- Feedback ---- */
  .feedback-box {
    margin-top: 16px;
    border-radius: 12px;
    padding: 16px 18px;
    display: none;
    font-size: 0.95rem;
    line-height: 1.55;
    text-align: center;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: rgba(46,204,113,0.12); border: 1px solid var(--good); }
  .feedback-box.wrong { background: rgba(232,76,76,0.12); border: 1px solid var(--bad); }
  .feedback-head { font-weight: 700; margin-bottom: 6px; font-size: 1.1rem; }
  .feedback-box.correct .feedback-head { color: var(--good); }
  .feedback-box.wrong .feedback-head { color: var(--bad); }

  .next-btn {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f7cff, #6f5cff);
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    display: none;
  }
  .next-btn.show { display: block; }

  /* ---- Ergebnis ---- */
  .badge {
    text-align: center;
    font-size: 3.4rem;
    margin-bottom: 4px;
  }
  .result-score {
    text-align: center;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--gold);
    margin: 4px 0 18px;
  }

  @media (max-width: 420px) {
    .answer-row { gap: 8px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="card">

    <!-- ===================== START SCREEN ===================== -->
    <div class="section active" id="screen-start">
      <h1>🎯 LGS Quiz</h1>
      <p class="subtitle">Löse lineare Gleichungssysteme mit zwei Unbekannten</p>

      <div class="choice-group">
        <div class="choice-label">Name</div>
        <input class="name-input" id="name-input" placeholder="Dein Name" maxlength="20">
      </div>

      <div class="choice-group">
        <div class="choice-label">Anzahl Aufgaben</div>
        <div class="pill-row" id="count-row">
          <div class="pill" data-count="10">10</div>
          <div class="pill selected" data-count="15">15</div>
          <div class="pill" data-count="20">20</div>
        </div>
      </div>

      <div class="choice-group">
        <div class="choice-label">Level</div>
        <div class="level-card" data-level="1"><span>Level 1</span><span class="stars">⭐</span></div>
        <div class="level-card" data-level="2"><span>Level 2</span><span class="stars">⭐⭐</span></div>
        <div class="level-card" data-level="3"><span>Level 3</span><span class="stars">⭐⭐⭐</span></div>
      </div>

      <div class="history-box">
        <div class="history-title">🏆 Highscore</div>
        <div id="history-list"><div class="history-empty">Noch keine Einträge</div></div>
      </div>
    </div>

    <!-- ===================== QUIZ SCREEN ===================== -->
    <div class="section" id="screen-quiz">
      <div class="quiz-top">
        <span id="quiz-progress">Aufgabe 1 / 15</span>
        <span class="score" id="quiz-score">0 Punkte</span>
      </div>
      <div class="progress" id="progress-bar"></div>

      <div class="task-box">
        <div class="task-eq" id="task-eq"></div>
      </div>

      <div class="answer-labels"><span>x =</span><span>y =</span></div>
      <div class="answer-row">
        <input class="answer-input" id="answer-x" placeholder="x" autocomplete="off">
        <input class="answer-input" id="answer-y" placeholder="y" autocomplete="off">
      </div>
      <div class="hint">Für Sonderfälle: „keine“ oder „unendlich“ eintragen.</div>

      <button class="check-btn" id="check-btn">Antwort prüfen</button>

      <div class="feedback-box" id="feedback-box">
        <div class="feedback-head" id="feedback-head"></div>
        <div id="feedback-body"></div>
      </div>

      <button class="next-btn" id="next-btn">Weiter →</button>
    </div>

    <!-- ===================== RESULT SCREEN ===================== -->
    <div class="section" id="screen-result">
      <div class="badge" id="result-badge">🥉</div>
      <h1>Spiel beendet</h1>
      <div class="result-score" id="result-score">0 Punkte</div>
      <div class="progress" id="result-progress"></div>

      <div class="history-box" style="margin-top:22px;">
        <div class="history-title">🏆 Highscore</div>
        <div id="result-history-list"></div>
      </div>

      <button class="start-btn" id="restart-btn" style="margin-top:18px;">Neues Spiel</button>
    </div>

  </div>
</div>

<script>
/* ============================================================
   LGS QUIZ – Spiellogik
   (unverändert übernommen; einzige inhaltliche Korrektur:
   hard() würfelt jetzt so lange neu, bis das System eine
   eindeutige Lösung hat – siehe Kommentar dort)
   ============================================================ */

const HS_KEY = "lgsDeluxeHS";
const R = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const C = (arr) => arr[Math.floor(Math.random() * arr.length)];

let level = 1, punkte = 0, nr = 0, maxA = 15, task, name = "", history = [];

function hs() { return JSON.parse(localStorage.getItem(HS_KEY) || "[]"); }
function saveHS() {
  let h = hs();
  h.push({ name, punkte, level, datum: new Date().toLocaleDateString("de-DE") });
  h.sort((a, b) => b.punkte - a.punkte);
  localStorage.setItem(HS_KEY, JSON.stringify(h.slice(0, 10)));
}

function term(k, v, f) {
  if (k === 0) return "";
  if (f) { if (k === 1) return v; if (k === -1) return "-" + v; return k + v; }
  return (k > 0 ? " + " : " - ") + (Math.abs(k) == 1 ? "" : Math.abs(k)) + v;
}

// Baut "ax" bzw. "by" als eigenständigen Term (ohne führendes Vorzeichen-Leerzeichen),
// für den Einsatz auf der rechten Seite einer Gleichung.
function bareTerm(k, v) {
  if (k === 0) return "0";
  if (k === 1) return v;
  if (k === -1) return "-" + v;
  return k + v;
}

// Erzeugt verschiedene, mathematisch gleichwertige Darstellungen von ax + by = r.
// Das sorgt für Abwechslung (nicht immer "ax+by=c"), damit nicht jede Aufgabe
// automatisch zum Additionsverfahren einlädt.
function eqVariant(a, b, r) {
  const variants = [];

  // 1) Standard: ax + by = r
  variants.push(() => {
    if (a === 0) return term(b, "y", true) + " = " + r;
    return term(a, "x", true) + term(b, "y", false) + " = " + r;
  });

  // 2) y vor x: by + ax = r
  variants.push(() => {
    if (b === 0) return term(a, "x", true) + " = " + r;
    return term(b, "y", true) + term(a, "x", false) + " = " + r;
  });

  // 3) Variable isoliert (lädt zum Einsetzungsverfahren ein): ax = r - by
  //    bzw. falls a praktischerweise 0 wäre (kommt hier nicht vor, a!=0 immer), Fallback auf Standard.
  if (a !== 0) {
    variants.push(() => `${bareTerm(a, "x")} = ${r}` + term(-b, "y", false));
  }

  // 4) Andere Variable isoliert: by = r - ax
  if (b !== 0) {
    variants.push(() => `${bareTerm(b, "y")} = ${r}` + term(-a, "x", false));
  }

  // 5) Gleichung gespiegelt: r = ax + by
  variants.push(() => {
    if (a === 0) return r + " = " + term(b, "y", true);
    return r + " = " + term(a, "x", true) + term(b, "y", false);
  });

  // 6) Term auf beiden Seiten: ax + k = (r+k) - by   (mit zufälliger Zugabe k auf beiden Seiten)
  //    Herleitung: ax + by = r  =>  ax = r - by  =>  ax + k = (r + k) - by
  {
    let k = R(-9, 9);
    if (k === 0) k = 1;
    const rPrime = r + k;
    variants.push(() => {
      const left = a === 0 ? String(k) : `${term(a, "x", true)}${k > 0 ? ` + ${k}` : ` - ${Math.abs(k)}`}`;
      return `${left} = ${rPrime}` + term(-b, "y", false);
    });
  }

  return C(variants)();
}

function eq(a, b, r) { return eqVariant(a, b, r); }

function unique(mx, cf) {
  let x = R(-mx, mx), y = R(-mx, mx), a, b, c, d;
  do { a = R(1, cf); b = R(-cf, cf) || R(1, cf); c = R(1, cf); d = R(-cf, cf) || R(1, cf); } while (a * d - b * c === 0);
  return { t: "e", x, y, text: eq(a, b, a * x + b * y) + "<br>" + eq(c, d, c * x + d * y) };
}
function none() { let a = R(1, 6), b = R(1, 6), r = R(-20, 20); return { t: "n", text: eq(a, b, r) + "<br>" + eq(a * 2, b * 2, r * 2 + 5) }; }
function inf() { let a = R(1, 6), b = R(1, 6), r = R(-20, 20); return { t: "i", text: eq(a, b, r) + "<br>" + eq(a * 2, b * 2, r * 2) }; }

function hard() {
  // Kleine Korrektur ggü. dem Original: a,b,c,d werden so lange neu gewürfelt,
  // bis das entstehende System wirklich genau eine Lösung hat (Determinante != 0).
  // Vorher konnte es in seltenen Fällen (~0,2%) passieren, dass das als "eindeutig"
  // markierte System in Wahrheit keine oder unendlich viele Lösungen hatte.
  let x = R(-12, 12), y = R(-12, 12), a, b, c, d, det;
  do {
    a = R(2, 9); b = R(2, 9); c = R(2, 9); d = R(2, 9);
    det = (a - c) * (-1) - b * d;
  } while (det === 0);
  // Erste Gleichung bleibt bewusst in der "Term auf beiden Seiten"-Form (a x + b y = c x + K),
  // die zweite Gleichung bekommt zusätzlich eine zufällige Darstellungsvariante.
  const K = a * x + b * y - c * x;
  const kPart = K === 0 ? "" : (K > 0 ? ` + ${K}` : ` - ${Math.abs(K)}`);
  const eq1 = `${a}x + ${b}y = ${c}x${kPart}`;
  const eq2 = eq(d, -1, d * x - y);
  return { t: "e", x, y, text: eq1 + "<br>" + eq2 };
}

function gen() {
  let z = Math.random();
  if (level == 1) { if (z < .15) return none(); if (z < .30) return inf(); return unique(5, 4); }
  if (level == 2) { if (z < .1) return none(); if (z < .2) return inf(); return unique(10, 12); }
  if (z < .2) return none(); if (z < .4) return inf(); return hard();
}

/* ============================================================
   UI-Layer (im Stil der anderen Quizzes)
   ============================================================ */

function showScreen(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHistory(targetId) {
  const list = document.getElementById(targetId);
  const board = hs();
  if (board.length === 0) {
    list.innerHTML = '<div class="history-empty">Noch keine Einträge</div>';
    return;
  }
  list.innerHTML = board.map((h, i) => `
    <div class="history-row">
      <span class="history-rank">${i + 1}.</span>
      <span class="history-name">${escapeHtml(h.name)}</span>
      <span class="history-meta">Lvl ${h.level} · ${h.datum}</span>
      <span class="history-score">${h.punkte} Pkt</span>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderProgress(targetId) {
  const box = document.getElementById(targetId);
  box.innerHTML = Array.from({ length: maxA }, (_, i) => {
    let c = 'seg';
    if (history[i] === true) c += ' ok';
    if (history[i] === false) c += ' bad';
    return `<div class="${c}"></div>`;
  }).join('');
}

document.querySelectorAll('#count-row .pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('#count-row .pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
  });
});

document.querySelectorAll('.level-card').forEach(card => {
  card.addEventListener('click', () => start(parseInt(card.dataset.level)));
});

document.getElementById('check-btn').addEventListener('click', check);
document.getElementById('next-btn').addEventListener('click', nextQ);
document.getElementById('restart-btn').addEventListener('click', () => {
  showScreen('screen-start');
  renderHistory('history-list');
});

['answer-x', 'answer-y'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', (e) => {
    if (e.key === 'Enter') check();
  });
});

function start(l) {
  name = document.getElementById('name-input').value.trim() || 'Unbekannt';
  maxA = parseInt(document.querySelector('#count-row .pill.selected').dataset.count);
  level = l; punkte = 0; nr = 0; history = [];
  showScreen('screen-quiz');
  nextQ();
}

function nextQ() {
  if (nr >= maxA) return ende();
  task = gen();
  nr++;

  document.getElementById('quiz-progress').textContent = `Aufgabe ${nr} / ${maxA}`;
  document.getElementById('quiz-score').textContent = `${punkte} Punkte`;
  renderProgress('progress-bar');

  document.getElementById('task-eq').innerHTML = task.text;

  const xInput = document.getElementById('answer-x');
  const yInput = document.getElementById('answer-y');
  xInput.value = '';
  yInput.value = '';
  xInput.disabled = false;
  yInput.disabled = false;

  document.getElementById('check-btn').disabled = false;

  const fb = document.getElementById('feedback-box');
  fb.classList.remove('show', 'correct', 'wrong');

  document.getElementById('next-btn').classList.remove('show');

  xInput.focus();
}

function check() {
  if (document.getElementById('answer-x').disabled) return;

  let x = (document.getElementById('answer-x').value || '').toLowerCase().trim();
  let y = (document.getElementById('answer-y').value || '').toLowerCase().trim();
  let ok = false, sol = '';

  if (task.t == 'e') { ok = Number(x) === task.x && Number(y) === task.y; sol = `x = ${task.x}, y = ${task.y}`; }
  if (task.t == 'n') { ok = x.includes('keine') || y.includes('keine'); sol = 'Keine Lösung'; }
  if (task.t == 'i') { ok = x.includes('unendlich') || y.includes('unendlich'); sol = 'Unendlich viele Lösungen'; }

  history[nr - 1] = ok;
  if (ok) punkte += 10; else punkte -= 5;

  document.getElementById('quiz-score').textContent = `${punkte} Punkte`;
  renderProgress('progress-bar');

  document.getElementById('answer-x').disabled = true;
  document.getElementById('answer-y').disabled = true;
  document.getElementById('check-btn').disabled = true;

  const fb = document.getElementById('feedback-box');
  fb.classList.add('show', ok ? 'correct' : 'wrong');
  document.getElementById('feedback-head').textContent = ok ? '✅ Richtig!' : '❌ Falsch!';
  document.getElementById('feedback-body').innerHTML = `Antwort: <b>${sol}</b>`;

  document.getElementById('next-btn').classList.add('show');
}

function ende() {
  let medal = '🥉'; if (punkte >= 90) medal = '🥈'; if (punkte >= 130) medal = '🥇';
  saveHS();

  document.getElementById('result-badge').textContent = medal;
  document.getElementById('result-score').textContent = `${punkte} Punkte`;
  renderProgress('result-progress');
  renderHistory('result-history-list');

  showScreen('screen-result');
}

renderHistory('history-list');
</script>
